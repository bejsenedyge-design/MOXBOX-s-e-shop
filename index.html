<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOXBOX — Умный очиститель воздуха с живым мхом</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;
  --bg2:#111111;
  --bg3:#1a1a1a;
  --bg4:#222222;
  --surface:#161616;
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.14);
  --text:#f5f5f5;
  --text2:#a0a0a0;
  --text3:#666;
  --accent:#e8ff47;
  --accent2:#c8e820;
  --accent-dark:#1a1e00;
  --radius:20px;
  --radius-sm:12px;
  --radius-xs:8px;
  --transition:0.4s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"]{
  --bg:#f4f4f0;
  --bg2:#efefeb;
  --bg3:#e8e8e4;
  --bg4:#deded8;
  --surface:#fafaf8;
  --border:rgba(0,0,0,0.08);
  --border2:rgba(0,0,0,0.14);
  --text:#0f0f0f;
  --text2:#555;
  --text3:#999;
  --accent:#1a1e00;
  --accent2:#2a2f00;
  --accent-dark:#e8ff47;
}

html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  transition:background var(--transition),color var(--transition);
  line-height:1.6;
}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 48px;
  background:rgba(10,10,10,0.6);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  transition:background var(--transition),border-color var(--transition);
}
[data-theme="light"] nav{background:rgba(244,244,240,0.6)}
.nav-logo{
  font-family:'Syne',sans-serif;
  font-size:22px;font-weight:800;
  letter-spacing:-0.5px;
  color:var(--text);
  text-decoration:none;
}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:36px;list-style:none}
.nav-links a{
  font-size:14px;color:var(--text2);text-decoration:none;
  transition:color 0.2s;letter-spacing:0.02em;
}
.nav-links a:hover,.nav-links a.active{color:var(--text)}
.nav-right{display:flex;align-items:center;gap:16px}
.theme-toggle{
  width:44px;height:24px;border-radius:12px;
  background:var(--bg4);border:1px solid var(--border2);
  cursor:pointer;position:relative;transition:background var(--transition);
}
.theme-toggle::after{
  content:'';position:absolute;top:3px;left:3px;
  width:16px;height:16px;border-radius:50%;
  background:var(--text2);
  transition:transform 0.3s,background 0.3s;
}
[data-theme="light"] .theme-toggle::after{transform:translateX(20px);background:var(--text)}
.btn-nav{
  padding:8px 20px;border-radius:100px;
  background:var(--accent);color:var(--accent-dark);
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;
  border:none;cursor:pointer;transition:opacity 0.2s,transform 0.2s;
}
.btn-nav:hover{opacity:0.85;transform:scale(0.97)}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:120px 48px 80px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.hero-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 20%, rgba(232,255,71,0.07) 0%, transparent 60%),
             radial-gradient(ellipse 40% 40% at 20% 80%, rgba(232,255,71,0.04) 0%, transparent 50%);
  pointer-events:none;
}
[data-theme="light"] .hero-bg{
  background:radial-gradient(ellipse 80% 60% at 50% 20%, rgba(26,30,0,0.06) 0%, transparent 60%);
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 16px;border-radius:100px;
  border:1px solid var(--border2);
  background:var(--bg2);
  font-size:13px;color:var(--text2);
  margin-bottom:36px;
  animation:fadeUp 0.6s ease both;
}
.hero-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.hero h1{
  font-family:'Syne',sans-serif;
  font-size:clamp(52px,7vw,96px);
  font-weight:800;line-height:1.0;
  letter-spacing:-3px;
  max-width:900px;
  animation:fadeUp 0.6s 0.1s ease both;
}
.hero h1 .accent{color:var(--accent)}
.hero-sub{
  font-size:clamp(16px,2vw,20px);
  color:var(--text2);font-weight:300;
  max-width:520px;margin:24px auto 0;
  line-height:1.7;
  animation:fadeUp 0.6s 0.2s ease both;
}
.hero-cta{
  display:flex;gap:12px;justify-content:center;
  margin-top:44px;
  animation:fadeUp 0.6s 0.3s ease both;
}
.btn-primary{
  padding:16px 36px;border-radius:100px;
  background:var(--accent);color:var(--accent-dark);
  font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;
  border:none;cursor:pointer;
  transition:transform 0.2s,box-shadow 0.2s;
}
.btn-primary:hover{transform:scale(1.03);box-shadow:0 0 40px rgba(232,255,71,0.25)}
.btn-secondary{
  padding:16px 36px;border-radius:100px;
  background:transparent;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:16px;font-weight:400;
  border:1px solid var(--border2);cursor:pointer;
  transition:background 0.2s,border-color 0.2s;
}
.btn-secondary:hover{background:var(--bg2)}
.hero-trust{
  display:flex;align-items:center;gap:24px;justify-content:center;
  margin-top:56px;
  animation:fadeUp 0.6s 0.4s ease both;
}
.trust-stat{text-align:center}
.trust-num{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;color:var(--text)}
.trust-label{font-size:12px;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;margin-top:2px}
.trust-div{width:1px;height:40px;background:var(--border)}
.hero-visual{
  width:min(520px,90vw);height:320px;
  border-radius:var(--radius);
  border:1px solid var(--border);
  background:var(--bg2);
  margin:56px auto 0;
  position:relative;overflow:hidden;
  animation:fadeUp 0.6s 0.25s ease both;
}
.hero-visual-inner{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}
.hero-glow{
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle, rgba(232,255,71,0.15) 0%, transparent 70%);
  animation:breathe 4s ease-in-out infinite;
}
@keyframes breathe{0%,100%{transform:scale(1);opacity:0.7}50%{transform:scale(1.15);opacity:1}}
.hero-product-label{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  font-size:11px;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--text3);
}
.canvas-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;
  opacity:0.5;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* SECTION */
section{padding:100px 48px;max-width:1200px;margin:0 auto}
.section-label{
  font-size:12px;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--accent);margin-bottom:16px;
}
.section-title{
  font-family:'Syne',sans-serif;
  font-size:clamp(36px,4vw,56px);font-weight:800;
  letter-spacing:-2px;line-height:1.1;
  max-width:640px;
}
.section-title .muted{color:var(--text3)}

/* BENTO GRID */
.bento{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:16px;
  margin-top:56px;
}
.bento-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:32px;
  transition:border-color 0.2s,transform 0.2s;
  overflow:hidden;position:relative;
}
.bento-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.bento-card.col-8{grid-column:span 8}
.bento-card.col-3{grid-column:span 3}
.bento-card.col-4{grid-column:span 4}
.bento-card.col-6{grid-column:span 6}
.bento-card.col-5{grid-column:span 5}
.bento-card.col-7{grid-column:span 7}
.bento-card.col-12{grid-column:span 12}
.bento-card.tall{min-height:360px}
.bento-card .card-icon{
  width:48px;height:48px;border-radius:var(--radius-xs);
  background:var(--bg3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;margin-bottom:20px;
}
.bento-card .card-title{
  font-family:'Syne',sans-serif;font-size:22px;font-weight:700;
  letter-spacing:-0.5px;margin-bottom:10px;line-height:1.2;
}
.bento-card .card-desc{font-size:15px;color:var(--text2);line-height:1.7;max-width:420px}
.bento-card.accent-card{
  background:var(--accent);
  border-color:transparent;
}
.bento-card.accent-card .card-title,.bento-card.accent-card .card-desc{color:var(--accent-dark)}
.bento-card.accent-card .card-icon{background:rgba(26,30,0,0.12);border-color:rgba(26,30,0,0.15)}
.stat-big{
  font-family:'Syne',sans-serif;
  font-size:72px;font-weight:800;letter-spacing:-3px;
  line-height:1;color:var(--accent);
  margin-bottom:8px;
}
.stat-sub{font-size:15px;color:var(--text2)}
.tag-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px}
.tag{
  padding:5px 14px;border-radius:100px;
  background:var(--bg3);border:1px solid var(--border);
  font-size:13px;color:var(--text2);
}
.perf-row{display:flex;align-items:center;gap:12px;margin-top:12px}
.perf-label{font-size:13px;color:var(--text2);width:100px;flex-shrink:0}
.perf-bar-wrap{flex:1;height:6px;border-radius:3px;background:var(--bg4)}
.perf-bar{height:6px;border-radius:3px;background:var(--accent);transition:width 1.2s ease}
.perf-val{font-size:13px;font-weight:500;width:36px;text-align:right}
.ba-container{
  position:relative;width:100%;height:180px;
  border-radius:var(--radius-sm);overflow:hidden;
  margin-top:20px;cursor:ew-resize;
  user-select:none;
}
.ba-before,.ba-after{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:40px;font-weight:800;
}
.ba-before{background:var(--bg4);color:var(--text3);border-radius:var(--radius-sm)}
.ba-after{background:var(--accent);color:var(--accent-dark);clip-path:inset(0 50% 0 0)}
.ba-handle{
  position:absolute;top:0;bottom:0;width:2px;
  background:white;left:50%;transform:translateX(-50%);
}
.ba-handle::after{
  content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:32px;height:32px;border-radius:50%;
  background:white;border:2px solid var(--bg4);
}
.ba-label{
  position:absolute;bottom:12px;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
  padding:4px 10px;border-radius:100px;
}
.ba-label.before{left:12px;background:var(--bg3);color:var(--text2)}
.ba-label.after{right:12px;background:var(--accent-dark);color:var(--accent)}
[data-theme="light"] .ba-label.after{background:rgba(26,30,0,0.8);color:var(--accent-dark)}

/* PRODUCT / CHECKOUT */
.product-section-wrap{
  background:var(--bg);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.product-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:64px;align-items:center;
}
.product-visual{
  aspect-ratio:1;border-radius:var(--radius);
  background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.product-glow{
  width:60%;height:60%;border-radius:50%;
  transition:background 0.4s;
}
.product-grid-lines{
  position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 39px,var(--border) 39px,var(--border) 40px),
    repeating-linear-gradient(90deg,transparent,transparent 39px,var(--border) 39px,var(--border) 40px);
}
.product-info .kicker{
  font-size:12px;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--accent);margin-bottom:20px;
}
.product-info h2{
  font-family:'Syne',sans-serif;font-size:clamp(32px,3vw,48px);
  font-weight:800;letter-spacing:-2px;line-height:1.1;
  margin-bottom:20px;
}
.product-info p{font-size:16px;color:var(--text2);line-height:1.7;margin-bottom:32px}
.config-section{margin-bottom:28px}
.config-label{font-size:13px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}
.color-swatches{display:flex;gap:10px}
.swatch{
  width:36px;height:36px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:border-color 0.2s,transform 0.2s;
}
.swatch.active{border-color:var(--text);transform:scale(1.1)}
.variant-btns{display:flex;gap:8px;flex-wrap:wrap}
.variant-btn{
  padding:8px 18px;border-radius:var(--radius-xs);
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);font-size:14px;cursor:pointer;
  transition:background 0.2s,border-color 0.2s,color 0.2s;
  font-family:'DM Sans',sans-serif;
}
.variant-btn.active{background:var(--bg2);border-color:var(--border2);color:var(--text)}
.price-block{display:flex;align-items:baseline;gap:12px;margin-bottom:28px}
.price-old{font-size:18px;color:var(--text3);text-decoration:line-through}
.price-new{
  font-family:'Syne',sans-serif;font-size:44px;font-weight:800;
  letter-spacing:-2px;color:var(--text);
}
.price-badge{
  padding:4px 12px;border-radius:100px;
  background:rgba(232,255,71,0.15);
  color:var(--accent);font-size:13px;font-weight:500;
  border:1px solid rgba(232,255,71,0.2);
}
[data-theme="light"] .price-badge{background:rgba(26,30,0,0.1);color:var(--accent);border-color:rgba(26,30,0,0.15)}
.btn-checkout{
  width:100%;padding:18px;border-radius:var(--radius-sm);
  background:var(--accent);color:var(--accent-dark);
  font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;
  border:none;cursor:pointer;
  transition:transform 0.2s,box-shadow 0.2s;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn-checkout:hover{transform:scale(1.02);box-shadow:0 8px 40px rgba(232,255,71,0.2)}
.checkout-note{
  display:flex;align-items:center;justify-content:center;gap:16px;
  margin-top:14px;font-size:13px;color:var(--text3);
}

/* CONTACTS */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;margin-top:56px}
.contact-form{display:flex;flex-direction:column;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:13px;color:var(--text2)}
.form-input{
  padding:14px 18px;border-radius:var(--radius-xs);
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;
  outline:none;transition:border-color 0.2s;
}
.form-input:focus{border-color:var(--border2)}
.form-input::placeholder{color:var(--text3)}
textarea.form-input{resize:vertical;min-height:110px}
.contact-info{display:flex;flex-direction:column;gap:24px}
.contact-item{
  display:flex;align-items:flex-start;gap:16px;
  padding:20px;border-radius:var(--radius-sm);
  background:var(--surface);border:1px solid var(--border);
}
.contact-item-icon{
  width:40px;height:40px;border-radius:var(--radius-xs);
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.contact-item-text .label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.contact-item-text a{color:var(--text);text-decoration:none;font-size:15px;transition:color 0.2s}
.contact-item-text a:hover{color:var(--accent)}

/* FAQ */
.faq-list{margin-top:48px;display:flex;flex-direction:column;gap:2px}
.faq-item{border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);overflow:hidden}
.faq-q{
  width:100%;padding:22px 28px;
  display:flex;align-items:center;justify-content:space-between;
  background:none;border:none;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;
  cursor:pointer;text-align:left;gap:16px;
  transition:background 0.2s;
}
.faq-q:hover{background:var(--bg2)}
.faq-arrow{
  width:28px;height:28px;border-radius:50%;
  background:var(--bg3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:16px;transition:transform 0.3s,background 0.2s;
}
.faq-item.open .faq-arrow{transform:rotate(45deg);background:var(--accent)}
.faq-item.open .faq-arrow span{color:var(--accent-dark)}
.faq-a{
  max-height:0;overflow:hidden;
  transition:max-height 0.4s ease,padding 0.3s;
}
.faq-item.open .faq-a{max-height:300px}
.faq-a-inner{padding:0 28px 22px;font-size:15px;color:var(--text2);line-height:1.7}

/* PAGE HERO (for inner pages) */
.page-hero{
  padding:160px 48px 80px;
  max-width:1200px;
  margin:0 auto;
}
.page-hero .page-label{
  font-size:12px;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--accent);margin-bottom:16px;
}
.page-hero h1{
  font-family:'Syne',sans-serif;
  font-size:clamp(40px,5vw,72px);
  font-weight:800;letter-spacing:-3px;line-height:1.05;
  max-width:700px;
}
.page-hero h1 .muted{color:var(--text3)}
.page-hero p{
  font-size:18px;color:var(--text2);
  max-width:480px;margin-top:20px;line-height:1.7;
}

/* FOOTER */
footer{
  border-top:1px solid var(--border);
  padding:48px;
  display:flex;align-items:center;justify-content:space-between;
  max-width:1200px;margin:0 auto;
}
.footer-logo{
  font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text)
}
.footer-logo span{color:var(--accent)}
.footer-links{display:flex;gap:28px}
.footer-links a{font-size:13px;color:var(--text3);text-decoration:none;transition:color 0.2s}
.footer-links a:hover{color:var(--text)}
.footer-copy{font-size:13px;color:var(--text3)}

/* DRAWER */
.drawer-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;
  opacity:0;pointer-events:none;transition:opacity var(--transition);
}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{
  position:fixed;top:0;right:0;bottom:0;width:min(480px,100vw);
  background:var(--bg2);border-left:1px solid var(--border);
  z-index:201;transform:translateX(100%);
  transition:transform var(--transition);
  display:flex;flex-direction:column;overflow-y:auto;
}
.drawer.open{transform:translateX(0)}
.drawer-header{
  padding:28px 32px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.drawer-header h3{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}
.drawer-close{
  width:36px;height:36px;border-radius:50%;
  background:var(--bg4);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;color:var(--text);
  transition:background 0.2s;
}
.drawer-close:hover{background:var(--bg3)}
.drawer-body{padding:32px;flex:1;display:flex;flex-direction:column;gap:20px}
.drawer-summary{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:20px;
}
.drawer-summary .row{
